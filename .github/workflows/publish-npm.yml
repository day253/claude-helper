# 通过 Git 标签触发 npm publish（版本须与 package.json 一致）
name: Publish to npm

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VER="${GITHUB_REF#refs/tags/v}"
          PKG_VER=$(node -p "require('./package.json').version")
          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "::error::Git tag v$TAG_VER does not match package.json version $PKG_VER"
            exit 1
          fi
          echo "Publishing claude-helper@$PKG_VER"

      - run: npm ci

      - run: npm run build

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
