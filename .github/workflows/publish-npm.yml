# 通过 Git 标签触发 npm publish（版本须与 package.json 一致）
name: Publish to npm

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    # 使用 Environment「npm」：NPM_TOKEN 建在环境 Secret 中（也可与仓库 Secret 同名并存，环境优先）
    # 文档：https://docs.github.com/en/actions/how-tos/deploy/configure-and-manage-deployments/manage-environments
    environment:
      name: npm
      url: https://www.npmjs.com/package/claude-helper
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # 未配置 Secret 时 npm publish 会报 ENEEDAUTH，在此给出明确提示
      - name: Require NPM_TOKEN secret
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::缺少 NPM_TOKEN。请在 GitHub 任选其一配置（名称均为 NPM_TOKEN）："
            echo "::error::1) Settings → Environments → npm → Environment secrets（推荐，可与审批/标签规则配合）"
            echo "::error::2) Settings → Secrets and variables → Actions → Repository secrets"
            echo "::error::Token：npm → Access Tokens → Automation 或具备 Publish 的 Granular token。"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          always-auth: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VER="${GITHUB_REF#refs/tags/v}"
          PKG_VER=$(node -p "require('./package.json').version")
          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "::error::Git tag v$TAG_VER does not match package.json version $PKG_VER"
            exit 1
          fi
          echo "Publishing claude-helper@$PKG_VER"

      - run: npm ci

      - run: npm run build

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
